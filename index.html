<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocuScan PDF</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- jsPDF para generar el PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <!-- Google Identity Services para OAuth -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    }
  </style>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top_left,_#1e293b,_#0f172a)] text-white pb-24">
  
  <!-- Header -->
  <header class="bg-white/10 backdrop-blur-xl border-b border-white/20 p-4 sticky top-0 z-10">
    <h1 class="text-xl font-bold flex items-center gap-2">
      <i data-lucide="file-text" class="text-green-400"></i>
      DocuScan PDF
    </h1>
  </header>

  <main class="p-4 max-w-2xl mx-auto">
    <!-- Configuración del Archivo -->
    <div class="mb-6 bg-white/10 backdrop-blur-xl p-4 rounded-2xl border border-white/20">
      <label class="block text-sm font-medium text-white/80 mb-2">Nombre del archivo PDF</label>
      <input type="text" id="pdfName" value="MiDocumento" class="w-full bg-white/5 border border-white/20 rounded-xl p-3 text-white focus:ring-1 focus:ring-green-400 focus:border-green-400 outline-none transition-all placeholder-white/40">
    </div>

    <!-- Estado Vacío -->
    <div id="emptyState" class="text-center py-12 px-4 bg-white/5 backdrop-blur-md rounded-2xl border-2 border-dashed border-white/20">
      <i data-lucide="camera" class="mx-auto h-12 w-12 text-white/40 mb-3"></i>
      <p class="text-white/70">No hay fotos seleccionadas.</p>
      <p class="text-sm text-white/50 mt-1">Usa los botones de abajo para añadir páginas a tu PDF.</p>
    </div>

    <!-- Cuadrícula de Imágenes -->
    <div id="imageGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4 hidden"></div>

    <!-- Botones de Acción -->
    <div id="actionButtons" class="mt-8 space-y-4 hidden">
      <button id="btnDownload" class="w-full bg-white/10 backdrop-blur-xl border border-white/20 text-white py-3.5 px-4 rounded-xl font-medium flex items-center justify-center gap-2 hover:bg-white/20 active:scale-[0.98] transition-all disabled:opacity-50">
        <i data-lucide="download" class="w-5 h-5"></i> <span id="downloadText">Descargar PDF</span>
      </button>
      
      <button id="btnUpload" class="w-full bg-green-400 text-emerald-900 py-3.5 px-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-green-300 active:scale-[0.98] transition-all disabled:opacity-50">
        <i data-lucide="upload-cloud" class="w-5 h-5" id="uploadIcon"></i> <span id="uploadText">Subir a Google Drive</span>
      </button>
    </div>
  </main>

  <!-- Botones Flotantes (Cámara y Galería) -->
  <div class="fixed bottom-6 right-6 flex flex-col gap-4">
    <input type="file" accept="image/*" multiple class="hidden" id="fileInput">
    <button onclick="document.getElementById('fileInput').click()" class="bg-white/10 backdrop-blur-xl text-white p-4 rounded-full border border-white/20 hover:bg-white/20 active:scale-90 transition-all shadow-[0_8px_32px_rgba(0,0,0,0.3)]" aria-label="Añadir desde galería">
      <i data-lucide="image"></i>
    </button>

    <input type="file" accept="image/*" capture="environment" class="hidden" id="cameraInput">
    <button onclick="document.getElementById('cameraInput').click()" class="bg-green-400 text-emerald-900 p-4 rounded-full hover:bg-green-300 active:scale-90 transition-all shadow-[0_8px_32px_rgba(74,222,128,0.3)]" aria-label="Tomar foto">
      <i data-lucide="camera"></i>
    </button>
  </div>

  <script>
    // ==========================================
    // CONFIGURACIÓN
    // ==========================================
    // Reemplaza esto con tu Client ID de Google Cloud para que funcione la subida a Drive
    const GOOGLE_CLIENT_ID = 'TU_CLIENT_ID_AQUI';
    // ==========================================

    // Inicializar iconos
    lucide.createIcons();

    // Estado de la aplicación
    let images = [];
    let tokenClient;
    
    // Referencias al DOM
    const emptyState = document.getElementById('emptyState');
    const imageGrid = document.getElementById('imageGrid');
    const actionButtons = document.getElementById('actionButtons');
    const fileInput = document.getElementById('fileInput');
    const cameraInput = document.getElementById('cameraInput');
    const pdfNameInput = document.getElementById('pdfName');
    const btnDownload = document.getElementById('btnDownload');
    const btnUpload = document.getElementById('btnUpload');
    const downloadText = document.getElementById('downloadText');
    const uploadText = document.getElementById('uploadText');

    // Inicializar Google Identity Services
    window.onload = () => {
      try {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: 'https://www.googleapis.com/auth/drive.file',
          callback: async (tokenResponse) => {
            if (tokenResponse && tokenResponse.access_token) {
              await uploadToDrive(tokenResponse.access_token);
            }
          },
        });
      } catch(e) {
        console.error("Error inicializando Google Identity Services", e);
      }
    };

    // Comprimir imagen usando Canvas
    const compressImage = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 1200;
            const MAX_HEIGHT = 1600;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
              }
            } else {
              if (height > MAX_HEIGHT) {
                width *= MAX_HEIGHT / height;
                height = MAX_HEIGHT;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7)); // 70% de calidad
          };
          img.onerror = reject;
        };
        reader.onerror = reject;
      });
    };

    // Actualizar la interfaz de usuario
    const updateUI = () => {
      if (images.length === 0) {
        emptyState.classList.remove('hidden');
        imageGrid.classList.add('hidden');
        actionButtons.classList.add('hidden');
      } else {
        emptyState.classList.add('hidden');
        imageGrid.classList.remove('hidden');
        actionButtons.classList.remove('hidden');
        
        imageGrid.innerHTML = '';
        images.forEach((img, idx) => {
          const div = document.createElement('div');
          div.className = 'relative group aspect-[3/4] bg-black/40 rounded-xl overflow-hidden border border-white/10';
          div.innerHTML = `
            <img src="${img}" alt="Página ${idx + 1}" class="w-full h-full object-cover opacity-90" />
            <div class="absolute top-0 left-0 bg-black/60 backdrop-blur-md text-white px-3 py-1.5 text-xs rounded-br-xl border-b border-r border-white/10">
              Pág ${idx + 1}
            </div>
            <button onclick="removeImage(${idx})" class="absolute top-2 right-2 bg-red-500/80 backdrop-blur-md text-white p-2 rounded-full border border-white/20 hover:bg-red-500 active:scale-95 transition-all">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          `;
          imageGrid.appendChild(div);
        });
        lucide.createIcons(); // Reinicializar iconos en los nuevos elementos
      }
    };

    // Eliminar imagen
    window.removeImage = (index) => {
      images.splice(index, 1);
      updateUI();
    };

    // Manejar selección de archivos
    const handleFiles = async (e) => {
      if (!e.target.files || e.target.files.length === 0) return;
      const files = Array.from(e.target.files);
      
      btnDownload.disabled = true;
      btnUpload.disabled = true;
      
      try {
        const compressedImages = await Promise.all(files.map(compressImage));
        images = [...images, ...compressedImages];
        updateUI();
      } catch (error) {
        console.error("Error comprimiendo imágenes", error);
        alert("Error al procesar las imágenes");
      } finally {
        btnDownload.disabled = false;
        btnUpload.disabled = false;
        e.target.value = ''; // Resetear input
      }
    };

    fileInput.addEventListener('change', handleFiles);
    cameraInput.addEventListener('change', handleFiles);

    // Generar Blob del PDF
    const generatePDFBlob = async () => {
      if (images.length === 0) throw new Error("No hay imágenes");
      
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const pdfWidth = pdf.internal.pageSize.getWidth();
      const pdfHeight = pdf.internal.pageSize.getHeight();

      for (let i = 0; i < images.length; i++) {
        if (i > 0) pdf.addPage();
        
        const imgProps = pdf.getImageProperties(images[i]);
        const ratio = imgProps.width / imgProps.height;
        
        let width = pdfWidth;
        let height = pdfWidth / ratio;

        if (height > pdfHeight) {
          height = pdfHeight;
          width = height * ratio;
        }

        const x = (pdfWidth - width) / 2;
        const y = (pdfHeight - height) / 2;

        pdf.addImage(images[i], 'JPEG', x, y, width, height);
      }

      return pdf.output('blob');
    };

    // Descargar PDF localmente
    btnDownload.addEventListener('click', async () => {
      if (images.length === 0) return;
      
      btnDownload.disabled = true;
      downloadText.innerText = 'Generando...';
      
      try {
        const blob = await generatePDFBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${pdfNameInput.value || 'Documento'}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (error) {
        console.error("Error generando PDF", error);
        alert("Error al generar el PDF");
      } finally {
        btnDownload.disabled = false;
        downloadText.innerText = 'Descargar PDF';
      }
    });

    // Iniciar subida a Drive
    btnUpload.addEventListener('click', () => {
      if (images.length === 0) return;
      
      if (GOOGLE_CLIENT_ID === 'TU_CLIENT_ID_AQUI') {
        alert("⚠️ Falta configurar el GOOGLE_CLIENT_ID en el código fuente para poder subir a Drive.");
        return;
      }

      if (tokenClient) {
        tokenClient.requestAccessToken();
      } else {
        alert("Error: Google Identity Services no está inicializado.");
      }
    });

    // Subir archivo a Google Drive (Multipart)
    const uploadToDrive = async (accessToken) => {
      btnUpload.disabled = true;
      uploadText.innerText = 'Subiendo a Google Drive...';
      
      try {
        const blob = await generatePDFBlob();
        
        const metadata = {
          name: `${pdfNameInput.value || 'Documento'}.pdf`,
          mimeType: 'application/pdf'
        };

        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', blob);

        const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
          method: 'POST',
          headers: {
            Authorization: `Bearer ${accessToken}`
          },
          body: form
        });

        if (!response.ok) {
          throw new Error('Error en la subida');
        }

        uploadText.innerText = '¡Subido con éxito!';
        setTimeout(() => {
          uploadText.innerText = 'Subir a Google Drive';
          btnUpload.disabled = false;
        }, 3000);
      } catch (error) {
        console.error(error);
        uploadText.innerText = 'Error al subir';
        setTimeout(() => {
          uploadText.innerText = 'Subir a Google Drive';
          btnUpload.disabled = false;
        }, 3000);
      }
    };
  </script>
</body>
</html>
