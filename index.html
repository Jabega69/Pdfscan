<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocuScan PDF - Scanner Pro</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- jsPDF para generar el PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <!-- Google Identity Services para OAuth -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    }
    /* Estilos personalizados para el efecto cristal no cubiertos por Tailwind base */
    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .glass-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    /* Animación para el estado de carga */
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .animate-pulse-soft {
      animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top_left,_#1e293b,_#0f172a)] text-white pb-24 selection:bg-green-400/30">
  
  <!-- Header -->
  <header class="bg-white/10 backdrop-blur-xl border-b border-white/20 p-4 sticky top-0 z-20 shadow-lg">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <h1 class="text-xl font-bold flex items-center gap-2 tracking-tight">
        <i data-lucide="file-text" class="text-green-400 w-6 h-6"></i>
        <span>DocuScan <span class="text-green-400">PDF</span></span>
      </h1>
      <div id="statusIndicator" class="text-[10px] uppercase tracking-widest text-white/40 font-bold hidden">
        Procesando...
      </div>
    </div>
  </header>

  <main class="p-4 max-w-2xl mx-auto">
    <!-- Configuración del Archivo -->
    <div class="mb-6 glass-card p-5 rounded-3xl shadow-2xl">
      <label class="block text-xs font-bold text-white/50 uppercase tracking-widest mb-2 ml-1">Nombre del documento</label>
      <input type="text" id="pdfName" value="MiDocumento" 
        class="w-full glass-input rounded-2xl p-4 text-white focus:ring-2 focus:ring-green-400/50 focus:border-green-400 outline-none transition-all placeholder-white/20 text-lg font-medium">
    </div>

    <!-- Estado Vacío -->
    <div id="emptyState" class="text-center py-20 px-6 bg-white/5 backdrop-blur-md rounded-3xl border-2 border-dashed border-white/10 flex flex-col items-center justify-center gap-4">
      <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center border border-white/10 mb-2">
        <i data-lucide="camera" class="h-10 w-10 text-white/20"></i>
      </div>
      <div>
        <p class="text-white/80 font-medium text-lg">Tu escáner está listo</p>
        <p class="text-sm text-white/40 mt-1 max-w-[240px] mx-auto">Toma una foto o selecciona archivos para empezar a crear tu PDF.</p>
      </div>
    </div>

    <!-- Cuadrícula de Imágenes -->
    <div id="imageGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4 hidden">
      <!-- Las imágenes se insertarán aquí -->
    </div>

    <!-- Botones de Acción -->
    <div id="actionButtons" class="mt-10 space-y-4 hidden">
      <button id="btnDownload" class="group w-full bg-white/10 backdrop-blur-xl border border-white/20 text-white py-4 px-6 rounded-2xl font-semibold flex items-center justify-center gap-3 hover:bg-white/20 active:scale-[0.98] transition-all disabled:opacity-50 shadow-xl">
        <i data-lucide="download" class="w-5 h-5 text-white/60 group-hover:text-white transition-colors"></i> 
        <span id="downloadText">Descargar PDF</span>
      </button>
      
      <button id="btnUpload" class="w-full bg-green-400 text-emerald-950 py-4 px-6 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-green-300 active:scale-[0.98] transition-all disabled:opacity-50 shadow-[0_10px_40px_rgba(74,222,128,0.2)]">
        <i data-lucide="upload-cloud" class="w-6 h-6" id="uploadIcon"></i> 
        <span id="uploadText">Subir a Google Drive</span>
      </button>
      
      <p id="uploadInfo" class="text-[10px] text-center text-white/30 uppercase tracking-tighter hidden">
        Conectado a Google Drive
      </p>
    </div>
  </main>

  <!-- Botones Flotantes (Cámara y Galería) -->
  <div class="fixed bottom-8 right-6 flex flex-col gap-5 z-30">
    <input type="file" accept="image/*" multiple class="hidden" id="fileInput">
    <button onclick="document.getElementById('fileInput').click()" 
      class="bg-white/10 backdrop-blur-xl text-white p-5 rounded-full border border-white/20 hover:bg-white/20 active:scale-90 transition-all shadow-2xl group" 
      aria-label="Añadir desde galería">
      <i data-lucide="image" class="w-7 h-7 text-white/70 group-hover:text-white"></i>
    </button>

    <input type="file" accept="image/*" capture="environment" class="hidden" id="cameraInput">
    <button onclick="document.getElementById('cameraInput').click()" 
      class="bg-green-400 text-emerald-950 p-5 rounded-full hover:bg-green-300 active:scale-90 transition-all shadow-[0_10px_40px_rgba(74,222,128,0.4)]" 
      aria-label="Tomar foto">
      <i data-lucide="camera" class="w-7 h-7"></i>
    </button>
  </div>

  <script>
    // ==========================================
    // CONFIGURACIÓN CRÍTICA
    // ==========================================
    // 1. Obtén tu ID en: https://console.cloud.google.com/
    // 2. Debe terminar en ".apps.googleusercontent.com"
    // 3. NO pongas una URL aquí, pon el ID de cliente.
    const GOOGLE_CLIENT_ID = '462342528001-3kk22rsm1u926sa8bmm9hrhn3u6p2bc7.apps.googleusercontent.com';
    // ==========================================

    // Inicializar iconos
    lucide.createIcons();

    // Estado de la aplicación
    let images = [];
    let tokenClient;
    
    // Referencias al DOM
    const emptyState = document.getElementById('emptyState');
    const imageGrid = document.getElementById('imageGrid');
    const actionButtons = document.getElementById('actionButtons');
    const fileInput = document.getElementById('fileInput');
    const cameraInput = document.getElementById('cameraInput');
    const pdfNameInput = document.getElementById('pdfName');
    const btnDownload = document.getElementById('btnDownload');
    const btnUpload = document.getElementById('btnUpload');
    const downloadText = document.getElementById('downloadText');
    const uploadText = document.getElementById('uploadText');
    const statusIndicator = document.getElementById('statusIndicator');
    const uploadInfo = document.getElementById('uploadInfo');

    // Inicializar Google Identity Services
    window.onload = () => {
      if (typeof google === 'undefined') {
        console.warn("Google Identity Services no cargado. Verifica tu conexión.");
        return;
      }
      try {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: 'https://www.googleapis.com/auth/drive.file',
          callback: async (tokenResponse) => {
            if (tokenResponse && tokenResponse.access_token) {
              await uploadToDrive(tokenResponse.access_token);
            }
          },
        });
      } catch(e) {
        console.error("Error inicializando Google Identity Services", e);
      }
    };

    // Comprimir imagen usando Canvas (Optimizado para PDF ligero)
    const compressImage = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            // Reducimos resolución para que el PDF no pese megas y megas
            const MAX_WIDTH = 1000; 
            const MAX_HEIGHT = 1400;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
              }
            } else {
              if (height > MAX_HEIGHT) {
                width *= MAX_HEIGHT / height;
                height = MAX_HEIGHT;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, 0, 0, width, height);
            
            // Calidad 0.6 (60%) es el punto dulce entre legibilidad y peso
            resolve(canvas.toDataURL('image/jpeg', 0.6)); 
          };
          img.onerror = reject;
        };
        reader.onerror = reject;
      });
    };

    // Actualizar la interfaz de usuario
    const updateUI = () => {
      if (images.length === 0) {
        emptyState.classList.remove('hidden');
        imageGrid.classList.add('hidden');
        actionButtons.classList.add('hidden');
      } else {
        emptyState.classList.add('hidden');
        imageGrid.classList.remove('hidden');
        actionButtons.classList.remove('hidden');
        
        imageGrid.innerHTML = '';
        images.forEach((img, idx) => {
          const div = document.createElement('div');
          div.className = 'relative group aspect-[3/4] bg-black/40 rounded-2xl overflow-hidden border border-white/10 shadow-lg animate-in fade-in zoom-in duration-300';
          div.innerHTML = `
            <img src="${img}" alt="Página ${idx + 1}" class="w-full h-full object-cover opacity-90" />
            <div class="absolute top-0 left-0 bg-black/60 backdrop-blur-md text-white px-3 py-1.5 text-[10px] font-bold uppercase tracking-widest rounded-br-2xl border-b border-r border-white/10">
              Pág ${idx + 1}
            </div>
            <button onclick="removeImage(${idx})" class="absolute top-2 right-2 bg-red-500/80 backdrop-blur-md text-white p-2.5 rounded-full border border-white/20 hover:bg-red-500 active:scale-95 transition-all shadow-lg">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          `;
          imageGrid.appendChild(div);
        });
        lucide.createIcons();
      }
    };

    // Eliminar imagen
    window.removeImage = (index) => {
      images.splice(index, 1);
      updateUI();
    };

    // Manejar selección de archivos
    const handleFiles = async (e) => {
      if (!e.target.files || e.target.files.length === 0) return;
      const files = Array.from(e.target.files);
      
      statusIndicator.classList.remove('hidden');
      btnDownload.disabled = true;
      btnUpload.disabled = true;
      
      try {
        const compressedImages = await Promise.all(files.map(compressImage));
        images = [...images, ...compressedImages];
        updateUI();
      } catch (error) {
        console.error("Error comprimiendo imágenes", error);
        alert("Error al procesar las imágenes");
      } finally {
        statusIndicator.classList.add('hidden');
        btnDownload.disabled = false;
        btnUpload.disabled = false;
        e.target.value = ''; 
      }
    };

    fileInput.addEventListener('change', handleFiles);
    cameraInput.addEventListener('change', handleFiles);

    // Generar Blob del PDF
    const generatePDFBlob = async () => {
      if (images.length === 0) throw new Error("No hay imágenes");
      
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const pdfWidth = pdf.internal.pageSize.getWidth();
      const pdfHeight = pdf.internal.pageSize.getHeight();

      for (let i = 0; i < images.length; i++) {
        if (i > 0) pdf.addPage();
        
        const imgProps = pdf.getImageProperties(images[i]);
        const ratio = imgProps.width / imgProps.height;
        
        let width = pdfWidth;
        let height = pdfWidth / ratio;

        if (height > pdfHeight) {
          height = pdfHeight;
          width = height * ratio;
        }

        const x = (pdfWidth - width) / 2;
        const y = (pdfHeight - height) / 2;

        pdf.addImage(images[i], 'JPEG', x, y, width, height, undefined, 'FAST');
      }

      return pdf.output('blob');
    };

    // Descargar PDF localmente
    btnDownload.addEventListener('click', async () => {
      if (images.length === 0) return;
      
      btnDownload.disabled = true;
      downloadText.innerText = 'Generando archivo...';
      
      try {
        const blob = await generatePDFBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${pdfNameInput.value || 'Documento'}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (error) {
        console.error("Error generando PDF", error);
        alert("Error al generar el PDF");
      } finally {
        btnDownload.disabled = false;
        downloadText.innerText = 'Descargar PDF';
      }
    });

    // Iniciar subida a Drive
    btnUpload.addEventListener('click', () => {
      if (images.length === 0) return;
      
      if (GOOGLE_CLIENT_ID.includes('TU_ID_DE_CLIENTE_AQUI')) {
        alert("⚠️ Configuración incompleta:\n\nDebes editar el archivo index.html y poner tu ID de cliente de Google Cloud en la variable GOOGLE_CLIENT_ID.");
        return;
      }

      if (tokenClient) {
        tokenClient.requestAccessToken();
      } else {
        alert("Error: El sistema de Google no se ha cargado correctamente. Recarga la página.");
      }
    });

    // Subir archivo a Google Drive (Multipart)
    const uploadToDrive = async (accessToken) => {
      btnUpload.disabled = true;
      uploadText.innerText = 'Subiendo a Drive...';
      uploadInfo.classList.remove('hidden');
      
      try {
        const blob = await generatePDFBlob();
        
        const metadata = {
          name: `${pdfNameInput.value || 'Documento'}.pdf`,
          mimeType: 'application/pdf'
        };

        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', blob);

        const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
          method: 'POST',
          headers: {
            Authorization: `Bearer ${accessToken}`
          },
          body: form
        });

        if (!response.ok) {
          throw new Error('Error en la subida');
        }

        uploadText.innerText = '¡PDF Subido con éxito!';
        btnUpload.classList.replace('bg-green-400', 'bg-emerald-500');
        
        setTimeout(() => {
          uploadText.innerText = 'Subir a Google Drive';
          btnUpload.classList.replace('bg-emerald-500', 'bg-green-400');
          btnUpload.disabled = false;
        }, 4000);
      } catch (error) {
        console.error(error);
        uploadText.innerText = 'Error al subir';
        setTimeout(() => {
          uploadText.innerText = 'Subir a Google Drive';
          btnUpload.disabled = false;
        }, 3000);
      }
    };
  </script>
</body>
</html>
